<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <meta name="description" content="A single-page hub linking to all of my projects." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <style>
    :root {
      --bg: #f6f7fb;
      --bg-grad-1: #eef1fb;
      --bg-grad-2: #f8f6fb;
      --surface: #ffffff;
      --surface-2: #f3f4f8;
      --text: #1a1c25;
      --text-muted: #6b7080;
      --text-faint: #9699aa;
      --border: #e6e8ef;
      --border-strong: #d8dbe6;
      --accent: #6366f1;
      --accent-hover: #4f52e0;
      --accent-soft: #ececfd;
      --shadow-sm: 0 1px 2px rgba(20, 22, 40, 0.05);
      --shadow-md: 0 4px 14px rgba(20, 22, 40, 0.07);
      --shadow-lg: 0 14px 36px rgba(20, 22, 40, 0.14);
      --radius: 16px;
      --radius-sm: 10px;
    }
    [data-theme="dark"] {
      --bg: #0e0f15;
      --bg-grad-1: #14151f;
      --bg-grad-2: #100f18;
      --surface: #181a23;
      --surface-2: #20222e;
      --text: #e9eaf0;
      --text-muted: #9a9fb2;
      --text-faint: #6c7185;
      --border: #272a37;
      --border-strong: #343849;
      --accent: #818cf8;
      --accent-hover: #9aa3fb;
      --accent-soft: #232544;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.45);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif,
        "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(1100px 500px at 12% -8%, var(--bg-grad-1), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, var(--bg-grad-2), transparent 55%);
      background-attachment: fixed;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    a { color: inherit; }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: clamp(28px, 5vw, 64px) clamp(18px, 4vw, 32px) 80px;
    }

    /* ---- Header ---- */
    header.site {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }
    .site-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.1;
    }
    .site-title .dot { color: var(--accent); }
    .site-sub {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 1.02rem;
      max-width: 60ch;
    }
    .theme-toggle {
      flex: none;
      width: 42px; height: 42px;
      display: grid; place-items: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform .15s ease, color .15s ease, border-color .15s ease;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--border-strong); transform: translateY(-1px); }
    .theme-toggle svg { width: 20px; height: 20px; }
    .theme-toggle .moon { display: none; }
    [data-theme="dark"] .theme-toggle .sun { display: none; }
    [data-theme="dark"] .theme-toggle .moon { display: block; }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 18px;
      margin-bottom: 26px;
    }
    .search {
      position: relative;
      flex: 1 1 240px;
      min-width: 200px;
    }
    .search svg {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; color: var(--text-faint); pointer-events: none;
    }
    .search input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      font-size: 0.96rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .search input::placeholder { color: var(--text-faint); }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .sort { display: flex; align-items: center; gap: 10px; }
    .sort-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .segmented {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }
    .segmented button {
      border: 0; background: transparent; cursor: pointer;
      font-size: 0.9rem; font-weight: 600;
      color: var(--text-muted);
      padding: 6px 12px; border-radius: 7px;
      transition: background .15s ease, color .15s ease;
    }
    .segmented button:hover { color: var(--text); }
    .segmented button.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }
    .dir-btn {
      width: 38px; height: 38px;
      display: grid; place-items: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: color .15s ease, border-color .15s ease, transform .15s ease;
    }
    .dir-btn:hover { color: var(--accent); border-color: var(--border-strong); }
    .dir-btn svg { width: 18px; height: 18px; transition: transform .2s ease; }
    .dir-btn[data-dir="asc"] svg { transform: rotate(180deg); }

    /* ---- Grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      box-shadow: var(--shadow-md);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute; inset: 0 0 auto 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0; transition: opacity .18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-strong);
    }
    .card:hover::before { opacity: 1; }

    .card h2 {
      font-size: 1.16rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 2px 0 0;
    }
    .card .desc {
      margin: 10px 0 0;
      color: var(--text-muted);
      font-size: 0.94rem;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 9px; border-radius: 999px;
    }
    .card .spacer { flex: 1 1 auto; min-height: 14px; }

    .meta {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-faint); font-size: 0.82rem;
      margin-top: 4px;
    }
    .meta svg { width: 14px; height: 14px; }

    .links { display: flex; gap: 9px; margin-top: 14px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.88rem; font-weight: 600;
      padding: 8px 13px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      cursor: pointer;
      transition: transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease;
      white-space: nowrap;
    }
    .btn svg { width: 15px; height: 15px; flex: none; }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      flex: 1 1 auto; justify-content: center;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost {
      background: var(--surface); color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-strong); }
    .lock { width: 12px; height: 12px; opacity: 0.7; margin-left: -2px; }

    /* ---- Empty state ---- */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 1rem;
    }

    /* ---- Footer ---- */
    footer.site {
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 10px 18px;
      align-items: center; justify-content: space-between;
      color: var(--text-faint); font-size: 0.85rem;
    }
    footer.site a { color: var(--text-muted); text-decoration: none; }
    footer.site a:hover { color: var(--accent); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

    @media (max-width: 560px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .sort { justify-content: space-between; }
      .links { flex-wrap: wrap; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div>
        <h1 class="site-title" id="site-title">Projects<span class="dot">.</span></h1>
        <p class="site-sub" id="site-sub"></p>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </header>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Search projects…" autocomplete="off" aria-label="Search projects" />
      </div>
      <div class="sort">
        <span class="sort-label">Sort</span>
        <div class="segmented" role="group" aria-label="Sort by">
          <button type="button" data-sort="updated">Last updated</button>
          <button type="button" data-sort="title">Title</button>
        </div>
        <button type="button" class="dir-btn" id="dir-btn" aria-label="Toggle sort direction">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
        </button>
      </div>
    </div>

    <main class="grid" id="grid" aria-live="polite"></main>

    <footer class="site">
      <span id="count"></span>
      <span><a id="repo-link" href="#" target="_blank" rel="noopener">View this page's source on GitHub</a></span>
    </footer>
  </div>

  <script src="projects.js"></script>
  <script src="app.js"></script>
</body>
</html>
